<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Emulator Pro</title>
    <meta name="description" content="A premium screen emulator tool for responsive design." />
    
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/screen.css">
    <link rel="stylesheet" href="css/fonts/font-awesome/css/font-awesome.css">
</head>
<body class="dark-mode">
    <div class="glass-bg"></div>
    
    <header class="main-header">
        <div class="logo">
            <i class="fa fa-desktop"></i>
            <h1>Screen Emulator <span>Pro</span></h1>
        </div>
        
        <div class="controls-container">
            <div class="main-input-stack">
                <div class="inputs-row">
                    <div class="input-wrapper dir-box">
                        <i class="fa fa-folder-open"></i>
                        <input type="text" id="dirInput" placeholder="Directory to watch (e.g. /Users/name/project)">
                        <button id="watchBtn">Watch</button>
                    </div>
                    <div class="url-group">
                        <div class="input-wrapper url-box">
                            <i class="fa fa-globe"></i>
                            <input type="text" id="urlInput" placeholder="URL to preview (e.g. http://localhost:8081)">
                            <button id="updateBtn">Update</button>
                        </div>
                        <button id="toggleAdvancedBtn" title="Advanced Options">
                            <i class="fa fa-cog"></i> Advanced Options
                        </button>
                    </div>
                </div>
    
                <div id="advancedOptions" class="advanced-options">
                    <table class="options-table">
                        <tr>
                            <th>Method</th>
                            <td>
                                <select id="requestMethod">
                                    <option value="GET">GET</option>
                                    <option value="POST">POST</option>
                                    <option value="PUT">PUT</option>
                                    <option value="PATCH">PATCH</option>
                                    <option value="DELETE">DELETE</option>
                                </select>
                            </td>
                        </tr>
                        <tr>
                            <th>Headers (JSON)</th>
                            <td>
                                <textarea id="requestHeaders" placeholder='{ "Authorization": "Bearer ...", "Custom-Header": "Value" }'></textarea>
                            </td>
                        </tr>
                        <tr>
                            <th>Body (JSON)</th>
                            <td>
                                <textarea id="requestBody" placeholder='{ "key": "value" }'></textarea>
                            </td>
                        </tr>
                    </table>
                </div>
            </div>
            
            <div class="view-modes">
                <button id="multiViewBtn" class="active" title="Multiple Screens"><i class="fa fa-th-large"></i></button>
                <button id="resizableViewBtn" title="Resizable Frame"><i class="fa fa-arrows-alt"></i></button>
                <button id="customViewBtn" title="Custom Size"><i class="fa fa-pencil-square-o"></i></button>
            </div>
        </div>
    </header>

    <main id="appContent">
        <!-- Multiple Screens View -->
        <section id="multiView" class="view-section active">
            <div class="device-container">
                <div class="device-wrapper mobile">
                    <div class="device-header"><span>Phone</span> 375 x 667</div>
                    <div class="frame-wrap">
                        <iframe id="frameMobile" sandbox="allow-same-origin allow-scripts"></iframe>
                    </div>
                </div>
                <div class="device-wrapper tablet">
                    <div class="device-header"><span>Tablet</span> 768 x 1024</div>
                    <div class="frame-wrap">
                        <iframe id="frameTablet" sandbox="allow-same-origin allow-scripts"></iframe>
                    </div>
                </div>
                <div class="device-wrapper desktop">
                    <div class="device-header"><span>Desktop</span> 1280 x 800</div>
                    <div class="frame-wrap">
                        <iframe id="frameDesktop" sandbox="allow-same-origin allow-scripts"></iframe>
                    </div>
                </div>
            </div>
        </section>

        <!-- Resizable View -->
        <section id="resizableView" class="view-section">
            <div class="resizable-container">
                <div class="device-header">Resizable Container</div>
                <div class="resizable-frame-wrap">
                    <iframe id="frameResizable" sandbox="allow-same-origin allow-scripts"></iframe>
                </div>
            </div>
        </section>

        <!-- Custom Size View -->
        <section id="customView" class="view-section">
            <div class="custom-controls">
                <div class="size-input">
                    <label>Width</label>
                    <input type="number" id="customWidth" value="1200">
                </div>
                <div class="size-input">
                    <label>Height</label>
                    <input type="number" id="customHeight" value="800">
                </div>
                <button id="applyCustomBtn">Apply Size</button>
            </div>
            <div id="customFrameContainer" class="device-wrapper custom">
                <div class="device-header">Custom Size</div>
                <div class="frame-wrap">
                    <iframe id="frameCustom" sandbox="allow-same-origin allow-scripts"></iframe>
                </div>
            </div>
        </section>
    </main>

    <div id="toast" class="toast">Hot reloading...</div>

    <!-- Scripts -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/screen.js"></script>
</body>
</html>
